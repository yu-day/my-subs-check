name: subs-check

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 40

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: 编译 subs-check
        run: |
          mkdir -p app/templates
          touch app/templates/.gitkeep
          touch assets/node_linux_amd64.zst
          touch assets/sub-store.bundle.js.zst

          go build -ldflags="-s -w" -trimpath -o subs-check .
          chmod +x subs-check
          echo "编译成功，文件大小: $(du -sh subs-check | cut -f1)"

      - name: 准备配置文件
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          SUB_URLS: ${{ secrets.SUB_URLS }}
        run: |
          sed -i "s|github-gist-id: \"\"|github-gist-id: \"${GIST_ID}\"|g" config.yaml
          sed -i "s|github-token: \"\"|github-token: \"${GIST_TOKEN}\"|g" config.yaml

          python3 -c "
          import re, os
          with open('config.yaml', 'r') as f:
              content = f.read()
          sub_urls = os.environ['SUB_URLS'].strip().split('\n')
          urls_yaml = 'sub-urls:\n' + '\n'.join(f'  - \"{u.strip()}\"' for u in sub_urls if u.strip())
          content = re.sub(r'sub-urls:.*?(\n\S|\Z)', urls_yaml + r'\1', content, flags=re.DOTALL)
          with open('config.yaml', 'w') as f:
              f.write(content)
          print('配置文件准备完成')
          "

          echo "=== 配置检查 ==="
          grep -v "github-token\|github-gist-id" config.yaml | head -30

      - name: 运行 subs-check
        run: |
          ./subs-check -f config.yaml &
          PID=$!
          echo "subs-check 已启动，PID: $PID"

          MAX_WAIT=1800
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            sleep 20
            ELAPSED=$((ELAPSED + 20))
            if [ -f "output/all.yaml" ] && [ -s "output/all.yaml" ]; then
              echo "检测完成，输出文件已生成，等待Gist写入..."
              sleep 15
              kill $PID 2>/dev/null || true
              echo "已正常退出，耗时约 ${ELAPSED} 秒"
              exit 0
            fi
            echo "等待检测完成... (${ELAPSED}/${MAX_WAIT}秒)"
          done

          echo "超时退出，检查订阅源是否有效"
          kill $PID 2>/dev/null || true

      - name: 生成 base64.txt 并上传 Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          if [ ! -f "output/all.yaml" ]; then
            echo "all.yaml 不存在，跳过"
            exit 0
          fi

          python3 << 'EOF'
          import yaml, base64, json, sys
          from urllib.parse import quote

          try:
              with open('output/all.yaml', 'r', encoding='utf-8') as f:
                  data = yaml.safe_load(f)
          except Exception as e:
              print(f"读取 all.yaml 失败: {e}", flush=True)
              sys.exit(1)

          proxies = data.get('proxies', [])
          print(f"输入节点总数: {len(proxies)}", flush=True)

          lines = []
          skip = 0

          for p in proxies:
              try:
                  ptype  = p.get('type', '')
                  name   = p.get('name', '')
                  server = p.get('server', '')
                  port   = str(p.get('port', ''))

                  if ptype == 'vmess':
                      net     = p.get('network', 'tcp')
                      ws_opts = p.get('ws-opts') or {}
                      grpc_opts = p.get('grpc-opts') or {}
                      vmess_obj = {
                          "v": "2", "ps": name, "add": server, "port": port,
                          "id":  p.get('uuid', ''),
                          "aid": str(p.get('alterId', 0)),
                          "net": net, "type": "none",
                          "host": (ws_opts.get('headers') or {}).get('Host', '') if net == 'ws' else '',
                          "path": ws_opts.get('path', '') if net == 'ws'
                                  else grpc_opts.get('grpc-service-name', '') if net == 'grpc'
                                  else '',
                          "tls": "tls" if p.get('tls') else ""
                      }
                      b64 = base64.b64encode(
                          json.dumps(vmess_obj, ensure_ascii=False).encode()).decode()
                      lines.append(f"vmess://{b64}")

                  elif ptype == 'vless':
                      uuid = p.get('uuid', '')
                      net  = p.get('network', 'tcp')
                      security = p.get('tls-opts', {}).get('serverName', '') or p.get('servername', '')
                      tls  = 'tls' if p.get('tls') else ''
                      flow = p.get('flow', '')

                      ws_opts   = p.get('ws-opts') or {}
                      grpc_opts = p.get('grpc-opts') or {}

                      params = []
                      params.append(f"type={net}")
                      params.append(f"encryption=none")
                      if tls:
                          params.append(f"security={tls}")
                      if security:
                          params.append(f"sni={security}")
                      if flow:
                          params.append(f"flow={flow}")
                      if net == 'ws':
                          path = ws_opts.get('path', '')
                          host = (ws_opts.get('headers') or {}).get('Host', '')
                          if path: params.append(f"path={quote(path)}")
                          if host: params.append(f"host={host}")
                      elif net == 'grpc':
                          svc = grpc_opts.get('grpc-service-name', '')
                          if svc: params.append(f"serviceName={svc}")
                          params.append("mode=gun")

                      query = '&'.join(params)
                      fragment = quote(name)
                      lines.append(f"vless://{uuid}@{server}:{port}?{query}#{fragment}")

                  elif ptype == 'ss':
                      cipher   = p.get('cipher', '')
                      password = p.get('password', '')
                      userinfo = base64.b64encode(
                          f"{cipher}:{password}".encode()).decode()
                      lines.append(f"ss://{userinfo}@{server}:{port}#{quote(name)}")

                  elif ptype == 'trojan':
                      password = p.get('password', '')
                      sni = p.get('sni', '') or p.get('servername', '')
                      uri = f"trojan://{quote(str(password))}@{server}:{port}"
                      if sni:
                          uri += f"?sni={sni}"
                      uri += f"#{quote(name)}"
                      lines.append(uri)

                  else:
                      skip += 1

              except Exception as e:
                  print(f"跳过节点 {p.get('name','?')}: {e}", flush=True)
                  skip += 1
                  continue

          print(f"转换成功: {len(lines)} 个，跳过: {skip} 个", flush=True)

          if not lines:
              print("警告：没有生成任何节点 URI", flush=True)
              sys.exit(0)

          content = '\n'.join(lines)
          b64_out = base64.b64encode(content.encode('utf-8')).decode()

          # 同时写 node.txt（供服务器拉取）和 base64.txt（兼容）
          with open('output/node.txt',   'w') as f: f.write(b64_out)
          with open('output/base64.txt', 'w') as f: f.write(b64_out)

          # 构造 Gist payload，同时更新两个文件
          payload = {
              'files': {
                  'node.txt':   {'content': b64_out},
                  'base64.txt': {'content': b64_out},
              }
          }
          with open('/tmp/gist_payload.json', 'w') as f:
              json.dump(payload, f)

          print("Gist payload 已生成", flush=True)
          EOF

          HTTP_CODE=$(curl -s -o /tmp/gist_resp.json -w "%{http_code}" -X PATCH \
            -H "Authorization: token ${GIST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @/tmp/gist_payload.json \
            "https://api.github.com/gists/${GIST_ID}")

          echo "Gist 上传状态码: ${HTTP_CODE}"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "node.txt 和 base64.txt 上传成功"
          else
            echo "上传失败，响应："
            cat /tmp/gist_resp.json
            exit 1
          fi

      - name: 检查输出结果
        run: |
          echo "=== 输出文件 ==="
          ls -la output/ 2>/dev/null || echo "output 目录不存在"

          if [ -f "output/base64.txt" ]; then
            COUNT=$(base64 -d output/base64.txt 2>/dev/null | grep -c "://" || echo "0")
            echo "base64节点数量: ${COUNT}"
          else
            echo "警告: base64.txt 未生成"
          fi

          if [ -f "output/all.yaml" ]; then
            NODE_COUNT=$(grep -c "^- name:\|^  - name:" output/all.yaml || echo "0")
            echo "YAML节点数量: ${NODE_COUNT}"
          fi

      - name: 上传 Artifact 备份
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: subs-check-output
          path: output/
          retention-days: 1

      - name: 保持仓库活跃（防止 Actions 被禁用）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last run: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .last_run
          git add .last_run
          git diff --staged --quiet || git commit -m "chore: update last run time [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
